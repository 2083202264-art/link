<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>我们的回忆</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap');

        * {
            font-family: 'ZCOOL KuaiLe', 'YouYuan', '幼圆', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(to bottom right, pink, purple);
            min-height: 100vh;
            position: relative;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
        }

        #start-btn {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 72px;
            padding: 40px 100px;
            background: #fff;
            border: none;
            border-radius: 80px;
            color: #d84f7c;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            cursor: pointer;
            z-index: 10;
            animation: pulse 2s infinite;
            white-space: nowrap;
        }
        #start-btn:hover { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 20px 45px rgba(0,0,0,0.3); }
        #start-btn:active { transform: translate(-50%, -50%) scale(0.96); }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255,255,255,0.7); }
            70% { box-shadow: 0 0 0 50px rgba(255,255,255,0); }
            100% { box-shadow: 0 0 0 0 rgba(255,255,255,0); }
        }
        #start-btn.fly-out {
            animation: flyOut 0.8s ease-out forwards;
            pointer-events: none;
        }
        @keyframes flyOut {
            0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-120px) scale(0.2); }
        }

        #main-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            opacity: 0;
            transform: translateY(80px);
            pointer-events: none;
            padding: 20px 0;
        }
        #main-content.show {
            animation: riseUp 1s ease forwards;
            pointer-events: auto;
        }
        @keyframes riseUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .main-title {
            font-size: 58px;
            color: white;
            text-shadow: 3px 3px 8px rgba(0,0,0,0.4);
            margin-bottom: 15px;
            letter-spacing: 5px;
        }

        #timer {
            font-size: 28px;
            color: #fff5e6;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.25);
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(5px);
            padding: 10px 30px;
            border-radius: 40px;
            margin: 10px 0 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }

        .upload-area { margin-bottom: 10px; }
        .upload-label {
            display: inline-block;
            background: rgba(255,255,255,0.25);
            backdrop-filter: blur(5px);
            color: white;
            font-size: 22px;
            padding: 10px 30px;
            border-radius: 40px;
            cursor: pointer;
            transition: background 0.3s;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.2);
            border: 2px solid rgba(255,255,255,0.5);
        }
        .upload-label:hover { background: rgba(255,255,255,0.4); }
        #upload-input { display: none; }

        .num {
            display: inline-block;
            min-width: 0.9em;
            text-align: center;
            transition: transform 0.3s ease;
            backface-visibility: hidden;
            transform-style: preserve-3d;
        }
        .num.flipping { transform: rotateX(-90deg); }

        .scroll-item {
            opacity: 1;
            transform: translateY(0) scale(1);
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease;
        }
        .scroll-item:not(.visible) {
            opacity: 0;
            transform: translateY(30px) scale(0.7);
        }

        #gallery {
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            width: 100%;
            max-width: 700px;
            padding: 20px 20px 100px;
            gap: 45px;
            position: relative;
            z-index: 1;
        }
        .photo-card {
            position: relative;
            border-radius: 20px;
            box-shadow: 0 6px 18px rgba(0,0,0,0.15);
            overflow: hidden;
            background: #fff;
            transition: transform 0.7s cubic-bezier(0.25, 1, 0.5, 1), opacity 0.7s ease;
        }
        .photo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .delete-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 32px;
            height: 32px;
            background: rgba(0,0,0,0.35);
            backdrop-filter: blur(4px);
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 18px;
            line-height: 1;
            cursor: pointer;
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 0.3s, transform 0.3s, background 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }
        .photo-card:hover .delete-btn {
            opacity: 1;
            transform: scale(1);
        }
        .delete-btn:hover {
            background: rgba(220, 50, 50, 0.8);
        }

        .heart {
            position: fixed;
            top: -60px;
            font-size: 20px;
            width: 1em;
            height: 0.9em;
            animation: fall linear forwards;
            pointer-events: none;
            z-index: 5;
        }
        .heart::before, .heart::after {
            content: "";
            position: absolute;
            top: 0;
            width: 0.5em;
            height: 0.8em;
            background: red;
            border-radius: 0.5em 0.5em 0 0;
        }
        .heart::before { left: 0.5em; transform: rotate(-45deg); transform-origin: 0 100%; }
        .heart::after { left: 0; transform: rotate(45deg); transform-origin: 100% 100%; }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) translateX(0); opacity: 1; }
            50% { transform: translateY(50vh) rotate(20deg) translateX(var(--sway)); }
            100% { transform: translateY(100vh) rotate(60deg) translateX(0); opacity: 0.2; }
        }
    </style>
</head>
<body>
    <button id="start-btn">点一下试试</button>

    <div id="main-content">
        <h1 class="main-title scroll-item">我们的回忆</h1>
        <div id="timer" class="scroll-item"></div>
        <div class="upload-area">
            <label for="upload-input" class="upload-label">+ 添加照片</label>
            <input type="file" id="upload-input" accept="image/*">
        </div>
        <div id="gallery"></div>
    </div>

    <script>
        // ========== 按钮逻辑 ==========
        const startBtn = document.getElementById("start-btn");
        const mainContent = document.getElementById("main-content");
        let heartInterval = null;

        startBtn.addEventListener("click", () => {
            startBtn.classList.add("fly-out");
            startBtn.addEventListener("animationend", function handler() {
                startBtn.removeEventListener("animationend", handler);
                startBtn.style.display = "none";
                mainContent.classList.add("show");
                if (!heartInterval) heartInterval = setInterval(createHeart, 120);
                updateTimer();
                mainContent.addEventListener("animationend", function showDone() {
                    mainContent.removeEventListener("animationend", showDone);
                    setupScrollObserver();
                });
            });
        });

        // ========== 计时器 ==========
        const timerDiv = document.getElementById("timer");
        timerDiv.appendChild(document.createTextNode("我们已经在一起 "));
        const labels = ["天", "时", "分", "秒"];
        const numSpans = [];
        labels.forEach((label, index) => {
            const numSpan = document.createElement("span");
            numSpan.className = "num";
            numSpan.textContent = "00";
            timerDiv.appendChild(numSpan);
            numSpans.push(numSpan);
            if (index < labels.length - 1) {
                timerDiv.appendChild(document.createTextNode(" " + label + " "));
            } else {
                timerDiv.appendChild(document.createTextNode(" " + label));
            }
        });

        let currentValues = ["00", "00", "00", "00"];
        function flipNumber(numSpan, newValue) {
            if (numSpan.dataset.flipping === "true") return;
            numSpan.dataset.flipping = "true";
            numSpan.classList.add("flipping");
            setTimeout(() => {
                numSpan.textContent = newValue;
                numSpan.classList.remove("flipping");
                setTimeout(() => { numSpan.dataset.flipping = "false"; }, 300);
            }, 150);
        }

        const startDate = new Date("2025-10-04T23:35:00");
        function updateTimer() {
            const now = new Date();
            const diff = now - startDate;
            if (diff < 0) { timerDiv.innerHTML = "时间还没到呢~"; return; }
            const totalSeconds = Math.floor(diff / 1000);
            const days = Math.floor(totalSeconds / (60 * 60 * 24));
            const hours = Math.floor((totalSeconds % (60 * 60 * 24)) / (60 * 60));
            const minutes = Math.floor((totalSeconds % (60 * 60)) / 60);
            const seconds = totalSeconds % 60;
            const newValues = [
                String(days).padStart(2, '0'),
                String(hours).padStart(2, '0'),
                String(minutes).padStart(2, '0'),
                String(seconds).padStart(2, '0')
            ];
            for (let i = 0; i < 4; i++) {
                if (newValues[i] !== currentValues[i]) {
                    flipNumber(numSpans[i], newValues[i]);
                    currentValues[i] = newValues[i];
                }
            }
        }
        setInterval(updateTimer, 1000);

        // ========== 爱心雨 ==========
        function createHeart() {
            const heart = document.createElement("div");
            heart.className = "heart";
            const scale = 0.8 + Math.random() * 0.8;
            heart.style.fontSize = scale + "em";
            const left = Math.random() * 90 + 5;
            heart.style.left = left + "%";
            const duration = 2 + Math.random() * 4;
            heart.style.animationDuration = duration + "s";
            const sway = (Math.random() - 0.5) * 100;
            heart.style.setProperty("--sway", sway + "px");
            heart.style.opacity = 0.6 + Math.random() * 0.4;
            document.body.appendChild(heart);
            heart.addEventListener("animationend", () => { heart.remove(); });
        }

        // ========== 创建照片卡片（带删除按钮） ==========
        const gallery = document.getElementById("gallery");

        function createPhotoCard(imgSrc) {
            const cardWidth = 130 + Math.floor(Math.random() * 150);
            const cardHeight = 120 + Math.floor(Math.random() * 80);
            const marginLeftPercent = 5 + Math.floor(Math.random() * 50);

            const card = document.createElement("div");
            card.className = "photo-card scroll-item";
            card.style.width = cardWidth + "px";
            card.style.height = cardHeight + "px";
            card.style.marginLeft = marginLeftPercent + "%";

            const img = document.createElement("img");
            img.src = imgSrc;
            img.alt = "回忆照片";
            card.appendChild(img);

            const deleteBtn = document.createElement("button");
            deleteBtn.className = "delete-btn";
            deleteBtn.innerHTML = "&#10005;";
            deleteBtn.title = "删除这张照片";
            card.appendChild(deleteBtn);

            deleteBtn.addEventListener("click", (e) => {
                e.stopPropagation();
                if (confirm("确定要删除这张照片吗？")) {
                    deletePhoto(imgSrc, card);
                }
            });

            gallery.appendChild(card);

            if (window.galleryObserver) {
                window.galleryObserver.observe(card);
                card.classList.add("visible");
            }
            return card;
        }

        // 删除照片函数
        async function deletePhoto(imgSrc, cardElement) {
            const parts = imgSrc.split("/");
            const filename = parts[parts.length - 1];
            try {
                const response = await fetch(`/api/delete-photo?filename=${encodeURIComponent(filename)}`, {
                    method: "DELETE"
                });
                const data = await response.json();
                if (data.success) {
                    cardElement.style.transition = "opacity 0.4s, transform 0.4s";
                    cardElement.style.opacity = "0";
                    cardElement.style.transform = "scale(0.8)";
                    setTimeout(() => {
                        cardElement.remove();
                    }, 400);
                } else {
                    alert("删除失败，再试一次～");
                }
            } catch (err) {
                alert("网络错误，删除失败");
            }
        }

        // ========== 上传照片到服务器 ==========
        const uploadInput = document.getElementById("upload-input");
        uploadInput.addEventListener("change", async function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const formData = new FormData();
            formData.append("photo", file);

            try {
                const response = await fetch("/api/upload", {
                    method: "POST",
                    body: formData
                });
                const data = await response.json();
                if (data.url) {
                    createPhotoCard(data.url);
                } else {
                    alert("上传失败，再试一次～");
                }
            } catch (err) {
                alert("网络错误，上传失败～");
            }
            uploadInput.value = "";
        });

        // ========== 滚动观察器 ==========
        function setupScrollObserver() {
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add("visible");
                    } else {
                        entry.target.classList.remove("visible");
                    }
                });
            }, { threshold: 0.1 });

            const items = document.querySelectorAll(".scroll-item");
            items.forEach(item => {
                observer.observe(item);
                item.classList.add("visible");
            });
            window.galleryObserver = observer;
        }
    </script>
</body>
</html>
